    <!-- GitHub Pages SPA Redirect Handler -->
    <script>
        (function(l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>

    <!-- PWA Install Prompt Handler -->
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.body.classList.add('pwa-installable');
            // Dispatch custom event for Blazor to handle
            window.dispatchEvent(new CustomEvent('pwaInstallable', { detail: { canInstall: true } }));
        });
        
        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            document.body.classList.remove('pwa-installable');
            window.dispatchEvent(new CustomEvent('pwaInstalled', { detail: { installed: true } }));
        });
        
        // Expose install function globally
        window.installPWA = async function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted PWA install');
                }
                deferredPrompt = null;
                return true;
            }
            return false;
        };
        
        window.canInstallPWA = function() {
            return !!deferredPrompt;
        };
        
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                // 优先尝试 published 版本，回退到 dev 版本
                const swUrls = ['/service-worker.published.js', '/service-worker.js'];
                
                async function registerSW(url) {
                    try {
                        const reg = await navigator.serviceWorker.register(url);
                        console.log('ServiceWorker registered:', url, reg.scope);
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'activated') {
                                    window.dispatchEvent(new CustomEvent('swUpdated'));
                                }
                            });
                        });
                        return true;
                    } catch (err) {
                        console.warn('ServiceWorker failed for', url, err);
                        return false;
                    }
                }
                
                (async () => {
                    for (const url of swUrls) {
                        if (await registerSW(url)) break;
                    }
                })();
            });
            
            // Handle online/offline events
            window.addEventListener('online', () => document.body.classList.remove('offline'));
            window.addEventListener('offline', () => document.body.classList.add('offline'));
        }
    </script>
